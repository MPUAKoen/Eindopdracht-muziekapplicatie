spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  seed:
    enabled: false

security:
  jwt:
    secret: test-secret-key-for-integration-tests-only
    expiration-ms: 86400000
